<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Тест з предмету</title>
</head>
<body>
    <h1>Тест з предмету</h1>
    <form action="#" method="post">
        <div class="question">
            <p class="qt">1. Який колір не входить до основних кольорів?</p>
            <label><input type="radio" name="q1" value="червоний" required> Червоний</label><br>
            <label><input type="radio" name="q1" value="зелений"> Зелений</label><br>
            <label><input type="radio" name="q1" value="чорний"> Чорний</label><br>
        </div>

        <div class="question">
            <p class="qt">2. Виберіть парні числа:</p>
            <label><input type="checkbox" name="q2" value="2"> 2</label><br>
            <label><input type="checkbox" name="q2" value="3"> 3</label><br>
            <label><input type="checkbox" name="q2" value="4"> 4</label><br>
        </div>

        <div class="question">
            <p class="qt">3. Напишіть столицю України:</p>
            <input type="text" name="q3" required placeholder="Ваша відповідь">
        </div>

        <button type="submit" class="submit-btn">Відправити відповіді</button>
    </form>
</body>
</html>
